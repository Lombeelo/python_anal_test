stages:
  - test
  - sast
  - dast
  - sca
  - gate

variables:
  PROJECT_NAME: "django-test-app"
  # таймауты/настройки по необходимости
  ZAP_PORT: "8090"
  ZAP_HOST: "127.0.0.1"
  SEMGREP_OUTPUT: "semgrep-report.json"
  ZAP_OUTPUT: "zap-report.xml"
  TRIVY_OUTPUT: "trivy-report.json"

image: docker:24.0.0
services:
  - name: docker:dind
    command: ["--insecure-registry=registry:5000"]

before_script:
  - apk add --no-cache py3-pip python3 git jq
  - pip3 install --upgrade pip

test:django:
  stage: test
  image: python:3.11-alpine
  script:
    - pip install -r requirements.txt
    - python manage.py check
  artifacts:
    when: always
    expire_in: 1h
    paths:
      - db.sqlite3

sast:semgrep:
  stage: sast
  image: returntocorp/semgrep:latest
  script:
    - semgrep --config=p/ci --json --output $SEMGREP_OUTPUT || true
  artifacts:
    reports:
      sast: $SEMGREP_OUTPUT
    paths:
      - $SEMGREP_OUTPUT
    expire_in: 1h

dast:owasp_zap:
  stage: dast
  image: owasp/zap2docker-stable:latest
  variables:
    ZAP_DAEMON: "true"
  script:
    - apk add --no-cache curl python3 py3-pip
    - # Запускаем ZAP в фоне (daemon mode уже внутри образа) — ожидаем поднятия
    - sleep 5
    - # Запускаем простую проверку: просканируем локальный сервер, но сначала запустим сервер в background
    - python3 -m pip install waitress
    - python3 manage.py runserver 0.0.0.0:8000 & sleep 2
    - /zap/zap-baseline.py -t http://127.0.0.1:8000 -r zap-report.html -J $ZAP_OUTPUT || true
  artifacts:
    paths:
      - $ZAP_OUTPUT
      - zap-report.html
    expire_in: 1h

sca:trivy:
  stage: sca
  image: aquasec/trivy:latest
  script:
    - # Т.к. Trivy обычно сканирует образы или filesystem, создадим временный образ приложения
    - docker build -t $CI_PROJECT_NAME:latest -f- . <<'DOCKERFILE'
      FROM python:3.11-alpine
      WORKDIR /app
      COPY . /app
      RUN pip install -r requirements.txt
      CMD ["python", "manage.py", "runserver", "0.0.0.0:8000"]
      DOCKERFILE
    - trivy image --format json --output $TRIVY_OUTPUT $CI_PROJECT_NAME:latest || true
  services: []
  artifacts:
    paths:
      - $TRIVY_OUTPUT
    expire_in: 1h

security:gate:
  stage: gate
  image: python:3.11-alpine
  dependencies:
    - sast:semgrep
    - dast:owasp_zap
    - sca:trivy
  script:
    - pip install --no-cache-dir jq
    - python3 security_gate.py --semgrep $SEMGREP_OUTPUT --zap $ZAP_OUTPUT --trivy $TRIVY_OUTPUT